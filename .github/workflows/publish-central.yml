name: Publish To Maven Central

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Publish snapshot or release artifacts"
        required: true
        default: snapshot
        type: choice
        options:
          - snapshot
          - release

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish snapshot module
        if: ${{ inputs.release_type == 'snapshot' }}
        env:
          CENTRAL_NAMESPACE: ${{ secrets.MAVEN_CENTRAL_NAMESPACE }}
          CENTRAL_PORTAL_USERNAME: ${{ secrets.MAVEN_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.MAVEN_PORTAL_PASSWORD }}
          CENTRAL_PUBLISHING_TYPE: ${{ secrets.MAVEN_CENTRAL_PUBLISHING_TYPE }}
          SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: >
          ./gradlew publishPublicModule
          -PsigningKey="$SIGNING_KEY"
          -PsigningPassword="$SIGNING_PASSWORD"

      - name: Publish release module
        if: ${{ inputs.release_type == 'release' }}
        env:
          CENTRAL_NAMESPACE: ${{ secrets.MAVEN_CENTRAL_NAMESPACE }}
          CENTRAL_PORTAL_USERNAME: ${{ secrets.MAVEN_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.MAVEN_PORTAL_PASSWORD }}
          CENTRAL_PUBLISHING_TYPE: ${{ secrets.MAVEN_CENTRAL_PUBLISHING_TYPE }}
          SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: >
          ./gradlew publishPublicRelease
          -PsigningKey="$SIGNING_KEY"
          -PsigningPassword="$SIGNING_PASSWORD"
