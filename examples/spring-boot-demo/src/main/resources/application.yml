server:
  port: 8080

demo:
  seedEnabled: true

llm:
  defaultProvider: openai
  providers:
    openai:
      kind: openai-compatible
      baseUrl: https://api.openai.com/v1
      apiKey: ${OPENAI_API_KEY:}
      model: gpt-4o-mini
      requestTimeoutMillis: 30000
    gemini:
      kind: gemini
      baseUrl: https://generativelanguage.googleapis.com/v1beta/models
      apiKey: ${GEMINI_API_KEY:}
      model: gemini-2.0-flash
      requestTimeoutMillis: 30000
    anthropic:
      kind: anthropic
      baseUrl: https://api.anthropic.com/v1
      apiKey: ${ANTHROPIC_API_KEY:}
      model: claude-3-5-sonnet-latest
      requestTimeoutMillis: 30000
  summarizer:
    provider: openai
    model: gpt-4o-mini

rag:
  indexPath: ./rag-index
  storeChunkText: true
  uploadMaxBytes: 10485760
  sourceLoadTimeoutMillis: 10000
  chunkerType: basic
  embeddingDimensions: 256
  graphProvider: falkordb
  graphFalkorHost: ${FALKORDB_HOST:127.0.0.1}
  graphFalkorPort: ${FALKORDB_PORT:6379}
  graphFalkorUsername: ${FALKORDB_USER:}
  graphFalkorPassword: ${FALKORDB_PASSWORD:}
  graphFalkorGraphNamePrefix: ${FALKORDB_GRAPH_PREFIX:rag}
  graphFallbackToMemory: false
  admin:
    enabled: true
    basePath: /rag-admin
    apiBasePath: /api/rag/admin
    defaultTenantId: tenant-web-demo
    defaultAclPrincipals:
      - group:demo
    defaultSearchPrincipals:
      - group:demo
    defaultSearchQuery: 하이브리드 검색
    defaultRecentProviderWindowMillis: 60000
