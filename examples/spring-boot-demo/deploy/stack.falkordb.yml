version: "3.9"

services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb
    ports:
      - "6379:6379"
      - "3310:3000"
    volumes:
      - falkordb-data:/data
    environment:
      - FALKORDB_USER=${FALKORDB_USER:-}
      - FALKORDB_PASSWORD=${FALKORDB_PASSWORD:-}
      - FALKORDB_ARGS=--protected-mode no
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -p 6379 ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  falkordb-data:
